<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      width: 100%;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      font-size: 1.2rem;
      font-weight: bold;
      height: 50px;
    }

    header span {
      color: #58a6ff;
    }

    .app {
      display: flex;
      width: 100%;
      height: calc(100% - 50px);
    }

    .sidebar {
      width: 200px;
      flex-shrink: 0;
      background: #f4f4f4;
      border-right: 2px solid #ddd;
      padding: 16px;
    }

    .sidebar h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    #map {
      flex: 1;
      height: 100%;
    }
  </style>
</head>

<body>

  <header style="display:flex; justify-content:space-between; align-items:center;">
    <div style="font-size:1.2rem; font-weight:bold;">Lingua<span>Map</span> - Shelby County, TN</div>
    <div style="font-size:0.7rem; color:#8b949e;">Made by Saul Bolanos & Eliseo Garcia &nbsp;|&nbsp; 2026 Rhodes
      Hackathon</div>
  </header>

  <div class="app">
    <div class="sidebar">
      <h3>Filter by Language</h3>
      <select id="langSelect">
        <option value="nonEnglishPct">All Non-English</option>
        <option value="spanish">Spanish</option>
        <option value="indoEuropean">Indo-European</option>
        <option value="asian">Asian / Pacific</option>
        <option value="other">Other Languages</option>
      </select>
      <p id="infoBox" style="margin-top:16px; font-size:0.85rem; color:#555;">
        Click a tract to explore.
      </p>
    </div>

    <div id="map"></div>
  </div>

  <script>
    var map = L.map('map').setView([35.1495, -90.0490], 11);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let tractLayer = null;
    let censusData = {};        // keyed by GEOID e.g. "47157000100"
    let currentField = "nonEnglishPct";

    // ── Color scale (light blue → dark blue) ─────────────────────────────────
    function getColor(pct) {
      if (pct >= 30) return "#08306b";
      if (pct >= 15) return "#2171b5";
      if (pct >= 5) return "#6baed6";
      if (pct >= 1) return "#c6dbef";
      return "#f7fbff";
    }

    // ── Get the right % for whichever language is selected ────────────────────
    function getPct(tract) {
      if (!tract) return 0; 
      if (currentField === "nonEnglishPct") return tract.nonEnglishPct;
      const count = tract.languages[currentField] || 0;
      return tract.total > 0 ? +(count / tract.total * 100).toFixed(1) : 0;
    }

    // ── Style each tract based on its data ────────────────────────────────────
    function styleFeature(feature) {
      const geoid = feature.properties.GEOID.slice(0,11);
      const tract = censusData[geoid];
      const pct = getPct(tract);
      return {
        fillColor: getColor(pct),
        fillOpacity: tract ? 0.7 : 0.1,
        color: "#333",
        weight: 1,
      };
    }

    // ── Click a tract → show info in sidebar ──────────────────────────────────
    function onEachFeature(feature, layer) {
      layer.on({
        mouseover(e) {
          e.target.setStyle({ weight: 2.5, color: "#000", fillOpacity: 0.9 });
        },
        mouseout(e) {
          tractLayer.resetStyle(e.target);
        },
        click(e) {
          const rawGeoid = feature.properties.GEOID;
          const geoid = rawGeoid.slice(0, 11);  //fix mismatch
          const tract = censusData[geoid];

          if (!tract) {
            document.getElementById("infoBox").innerHTML =
              "<strong>" + geoid + "</strong><br>No data available.";
            return;
          }

          const fieldLabels = {
            nonEnglishPct: "Non-English",
            spanish: "Spanish",
            indoEuropean: "Indo-European",
            asian: "Asian / Pacific",
            other: "Other languages",
          };

          const pct = getPct(tract);

          let top3html = "";
          for (const { lang, pct: p } of tract.top3) {
            top3html += "<br>" + (fieldLabels[lang] || lang) + ": " + p + "%";
          }

          document.getElementById("infoBox").innerHTML =
            "<strong>" + tract.name.split(";")[0] + "</strong>" +
            "<br>Total pop (5+): " + tract.total.toLocaleString() +
            "<br>" + fieldLabels[currentField] + ": <strong>" + pct + "%</strong>" +
            "<br><br><strong>Top languages:</strong>" +
            top3html;
        },
      });
    }

    // ── Language dropdown → recolor the map ───────────────────────────────────
    document.getElementById("langSelect").addEventListener("change", function () {
      currentField = this.value;
      if (tractLayer) tractLayer.setStyle(styleFeature);
      document.getElementById("infoBox").textContent = "Click a tract to explore.";
    });

    // ── Load data.json then fetch tract boundaries from Census API ─────────────
    fetch("data.json")
      .then(res => res.json())
      .then(rows => {
        // Index data by geoid
        rows.forEach(r => { censusData[r.geoid] = r; });

        // Fetch Shelby County tract boundaries from Census TIGER API
        const geoURL =
          "https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/tigerWMS_ACS2022/MapServer/8/query" +
          "?where=STATE%3D'47'+AND+COUNTY%3D'157'" +
          "&outFields=GEOID,NAME&f=geojson&outSR=4326";

        return fetch(geoURL);
      })
      .then(res => res.json())
      .then(geoData => {
        tractLayer = L.geoJSON(geoData, {
          style: styleFeature,
          onEachFeature: onEachFeature,
        }).addTo(map);
      })
      .catch(err => console.error("Failed to load map data:", err));

  </script>

</body>

</html>
